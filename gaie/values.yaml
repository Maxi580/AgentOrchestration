inferenceExtension:
  replicas: 1

  image:
    hub: ghcr.io/llm-d
    name: llm-d
    pullPolicy: Always

  extProcPort: 9002

  pluginsConfigFile: "config.yaml"
  pluginsCustomConfig:
    config.yaml: |
      apiVersion: inference.networking.x-k8s.io/v1alpha2
      kind: EndpointPickerConfig
      metadata:
        name: default
      spec:
        plugins:
          # Scores each vLLM pod based on how many requests are queued.
          - type: queue-scorer

          # Scores pods based on whether they already have cached KV data
          - type: prefix-scorer

          # Prefers pods with more free KV cache memory.
          - type: least-kv-cache-scorer

          # After all scorers run, this picks the pod with the highest total score.
          - type: max-score-picker

        # Chains the plugins together into a named pipeline.
        schedulingProfiles:
          - name: default
            plugins:
              - pluginRef: queue-scorer
                weight: 1.0
              - pluginRef: prefix-scorer
                weight: 1.0                           # equal weight = balanced decision
              - pluginRef: least-kv-cache-scorer
                weight: 1.0
              - pluginRef: max-score-picker

  monitoring:
    interval: "10s"
    prometheus:
      enabled: true

  flags:
    - -v=1

inferencePool:
  targetPorts:
    - number: 8000

  modelServerType: vllm

  modelServers:
    matchLabels:
      app: vllm-llama-3-8b