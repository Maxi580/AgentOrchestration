apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-app
  namespace: maxi-agent-orchestration
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: langgraph-app
  template:
    metadata:
      labels:
        app: langgraph-app
    spec:
      containers:
        - name: langgraph-app
          image: image-registry.openshift-image-registry.svc:5000/maxi-agent-orchestration/langgraph-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: LITELLM_BASE_URL
              value: "http://vllm-service:8000/v1"
            - name: MODEL_NAME
              value: "mistralai/Mistral-7B-Instruct-v0.3"
            - name: LITELLM_API_KEY
              value: "none"
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10