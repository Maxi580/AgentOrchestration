# =============================================
# Flowise - Lightweight AI Workflow Builder
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowise
  namespace: maxi-agent-orchestration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flowise
  template:
    metadata:
      labels:
        app: flowise
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: flowise
          image: flowiseai/flowise:latest
          ports:
            - containerPort: 3000
          env:
            - name: FLOWISE_USERNAME
              value: "admin"
            - name: FLOWISE_PASSWORD
              value: "admin"
            - name: DATABASE_PATH
              value: "/data/.flowise"
            - name: APIKEY_PATH
              value: "/data/.flowise"
            - name: SECRETKEY_PATH
              value: "/data/.flowise"
            - name: LOG_PATH
              value: "/data/.flowise/logs"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: flowise-data
              mountPath: /data
      volumes:
        - name: flowise-data
          emptyDir: {}