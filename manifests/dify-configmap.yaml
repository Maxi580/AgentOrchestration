apiVersion: v1
kind: ConfigMap
metadata:
  name: dify-config
  namespace: maxi-agent-orchestration
data:
  CONSOLE_API_URL: ""
  CONSOLE_WEB_URL: ""
  SERVICE_API_URL: ""
  APP_API_URL: ""
  APP_WEB_URL: ""
  FILES_URL: ""
  DEPLOY_ENV: "PRODUCTION"
  MIGRATION_ENABLED: "true"
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  FLASK_DEBUG: "false"
  DIFY_PORT: "5001"
  DIFY_BIND_ADDRESS: "0.0.0.0"
  SERVER_WORKER_AMOUNT: "1"
  SERVER_WORKER_CLASS: "gevent"
  GUNICORN_TIMEOUT: "360"
  APP_MAX_EXECUTION_TIME: "1200"
  DB_USERNAME: "postgres"
  DB_HOST: "dify-postgres"
  DB_PORT: "5432"
  DB_DATABASE: "dify"
  SQLALCHEMY_POOL_SIZE: "30"
  REDIS_HOST: "dify-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  STORAGE_TYPE: "opendal"
  OPENDAL_SCHEME: "fs"
  OPENDAL_FS_ROOT: "storage"
  VECTOR_STORE: "pgvector"
  PGVECTOR_HOST: "dify-postgres"
  PGVECTOR_PORT: "5432"
  PGVECTOR_USER: "postgres"
  PGVECTOR_DATABASE: "dify"
  CODE_EXECUTION_ENDPOINT: "http://dify-sandbox:8194"
  CODE_MAX_NUMBER: "9223372036854776000"
  CODE_MIN_NUMBER: "-9223372036854776000"
  CODE_MAX_DEPTH: "5"
  CODE_MAX_PRECISION: "20"
  CODE_MAX_STRING_LENGTH: "80000"
  SSRF_PROXY_HTTP_URL: "http://dify-ssrf:3128"
  SSRF_PROXY_HTTPS_URL: "http://dify-ssrf:3128"
  WEB_API_CORS_ALLOW_ORIGINS: "*"
  CONSOLE_CORS_ALLOW_ORIGINS: "*"
  MULTIMODAL_SEND_FORMAT: "base64"
  UPLOAD_FILE_SIZE_LIMIT: "15"
  ETL_TYPE: "dify"
  WORKFLOW_MAX_EXECUTION_STEPS: "500"
  WORKFLOW_MAX_EXECUTION_TIME: "1200"
  POSTGRES_DB: "dify"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  PGUSER: "postgres"
  SANDBOX_GIN_MODE: "release"
  SANDBOX_WORKER_TIMEOUT: "15"
  SANDBOX_ENABLE_NETWORK: "true"
  SANDBOX_HTTP_PROXY: "http://dify-ssrf:3128"
  SANDBOX_HTTPS_PROXY: "http://dify-ssrf:3128"
  SANDBOX_PORT: "8194"
  SSRF_HTTP_PORT: "3128"
  SSRF_COREDUMP_DIR: "/var/spool/squid"
  SSRF_REVERSE_PROXY_PORT: "8194"
  SSRF_SANDBOX_HOST: "dify-sandbox"
  SSRF_DEFAULT_TIME_OUT: "5"
  SSRF_DEFAULT_CONNECT_TIME_OUT: "5"
  SSRF_DEFAULT_READ_TIME_OUT: "5"
  SSRF_DEFAULT_WRITE_TIME_OUT: "5"