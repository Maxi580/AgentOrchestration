apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: maxi-agent-orchestration
data:
  config.yaml: |
    model_list:
      - model_name: mistral
        litellm_params:
          model: openai/mistralai/Mistral-7B-Instruct-v0.3
          api_base: http://vllm-service:8000/v1
          api_key: none

    litellm_settings:
      drop_params: true
      request_timeout: 600

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      disable_spend_logs: true 
