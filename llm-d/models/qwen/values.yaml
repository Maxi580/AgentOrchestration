modelArtifacts:
  name: "Qwen/Qwen3-8B"
  uri: "hf://Qwen/Qwen3-8B"
  authSecretName: "llm-d-hf-token"

  labels:
    app: vllm-qwen3-8b
    llm-d.ai/inference-serving: "true"

  size: 20Gi

decode:
  replicas: 1

  parallelism:
    tensor: 1

  nodeSelector:
    node-role.kubernetes.io/gpu-worker: ""

  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

  containers:
    - name: vllm
      image: "vllm/vllm-openai:latest"
      modelCommand: vllmServe
      mountModelVolume: true
      args:
        - "--served-model-name"
        - "Qwen/Qwen3-8B"
        - "--max-model-len"
        - "4096"
      env:
        - name: VLLM_CACHE_ROOT
          value: /tmp/vllm
        - name: HOME
          value: /tmp

prefill:
  replicas: 0

routing:
  proxy:
    enabled: false